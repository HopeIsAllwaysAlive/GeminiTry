<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civ Builder: Kittens Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- LEFT COLUMN: Resources -->
        <aside class="col-left">
            <h3>Grondstoffen</h3>
            <div id="left-resources">
                <!-- Resources will be rendered here -->
            </div>
        </aside>

        <!-- MIDDLE COLUMN: Content -->
        <main class="col-mid">
            <nav class="top-nav" id="main-nav">
                <button onclick="showTab('jobs')" id="nav-jobs" class="active">Stad</button>
                <button onclick="showTab('resources_tab')" id="nav-resources_tab">Grondstoffen</button>
                <button onclick="showTab('population')" id="nav-population">Bevolking</button>
                <button onclick="showTab('research')" id="nav-research">Onderzoek</button>
                <button onclick="showTab('explore')" id="nav-explore">Verkennen</button>
                <button onclick="showTab('diplomacy')" id="nav-diplomacy">Diplomatie</button>
                <button onclick="showTab('military')" id="nav-military">Militair</button>
                <button onclick="showTab('prestige')" id="nav-prestige">Tijdperken</button>
                <button onclick="showTab('debug')" id="nav-debug">Voortgang</button>
                <button onclick="showTab('settings')" id="nav-settings">Instellingen</button>
            </nav>
<div class="tab-content-container">
    <div id="tab-jobs" class="tab-content active">
    </div>

    <div id="tab-resources_tab" class="tab-content">
        <h2>Grondstoffen Analyse</h2>
        <p>Overzicht van productie, consumptie en multipliers.</p>
        <div id="resources-analysis-container"></div>
    </div>


                <div id="tab-population" class="tab-content">
                    <h2>Bevolking</h2>
                    <p>Vrije inwoners: <span id="pop-idle">0</span> / Totaal: <span id="pop-total">0</span></p>
                    <div id="jobs-container"></div>
                </div>

                <div id="tab-research" class="tab-content"></div>
                <div id="tab-explore" class="tab-content"></div>
                <div id="tab-diplomacy" class="tab-content"></div>
                <div id="tab-military" class="tab-content"></div>
                <div id="tab-prestige" class="tab-content"></div>
                <div id="tab-debug" class="tab-content">
                    <h2>Ontwikkeling & Voortgang</h2>
                    <p>Overzicht van alle game-elementen en hun unlocks.</p>
                    <div id="debug-container"></div>
                </div>
                <div id="tab-settings" class="tab-content"></div>
            </div>
        </main>

        <!-- RIGHT COLUMN: Log -->
        <aside class="col-right">
            <div id="calendar-display">
                Dag 0, Jaar 0 (Lente)
            </div>
            <div id="log-container">
                <div class="log-msg">Welkom bij je nieuwe beschaving.</div>
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="state.js"></script>
    <script src="engine.js"></script>
    <script src="ui/ui_utils.js"></script>
    <script src="ui/ui_events.js"></script>
    <script src="ui/ui_resources.js"></script>
    <script src="ui/ui_city.js"></script>
    <script src="ui/ui_population.js"></script>
    <script src="ui/ui_research.js"></script>
    <script src="ui/ui_explore.js"></script>
    <script src="ui/ui_diplomacy.js"></script>
    <script src="ui/ui_military.js"></script>
    <script src="ui/ui_prestige.js"></script>
    <script src="ui/ui_settings.js"></script>
    <script src="ui/ui_debug.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>

    <!-- Modal for Era Selection (Hidden by default) -->
    <div id="modal-container" style="display:none;"></div>
</body>
</html>
